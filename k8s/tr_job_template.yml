apiVersion: batch/v1
kind: Job
metadata:
  name: ctdenoiser-sweep
  namespace: usd-djha
  labels:
    app: wandb-sweep
    user: timgsereda
spec:
  completions: 1
  parallelism: 1
  completionMode: Indexed
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: wandb-sweep
        user: timgsereda
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-A10
                - NVIDIA-GeForce-RTX-3090
                - NVIDIA-GeForce-RTX-4090
                - NVIDIA-TITAN-RTX
                - NVIDIA-RTX-A5000
                - Quadro-RTX-6000
                - Tesla-V100-SXM2-32GB
                - NVIDIA-A40
                - NVIDIA-L40
                - NVIDIA-RTX-A6000
                - Quadro-RTX-8000
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
        - key: nvidia.com/gpu
          operator: Exists
          effect: PreferNoSchedule
      containers:
        - name: sweep-agent
          image: pytorch/pytorch:2.3.1-cuda12.1-cudnn8-runtime
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: "1"
          env:
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wandb-secret
                  key: api-key
            - name: WANDB_PROJECT
              value: ctdenoiser-sweep
            - name: WANDB_ENTITY
              value: timgsereda
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: data
              mountPath: /data
              readOnly: true
            - name: shm
              mountPath: /dev/shm
          args:
            - |
              set -e

              apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*

              pip install wandb matplotlib h5py

              # Copy preprocessed HDF5 from PVC to local emptyDir for fast I/O
              echo "Copying preprocessed data..."
              t0=$(date +%s)
              cp /data/ldct_preprocessed.h5 /workspace/data.h5
              echo "Copy done: $(du -h /workspace/data.h5 | cut -f1) in $(($(date +%s) - t0))s"

              git clone https://github.com/tsereda/ctdenoiser.git /workspace/ctdenoiser
              cd /workspace/ctdenoiser
              pip install -e .

              wandb agent timgsereda/ctdenoiser-sweep/SWEEP_ID
          command: ["/bin/bash", "-c"]
      volumes:
        - name: workspace
          emptyDir:
            sizeLimit: 50Gi
        - name: data
          persistentVolumeClaim:
            claimName: ctdenoiser
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
