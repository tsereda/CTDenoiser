apiVersion: batch/v1
kind: Job
metadata:
  name: ctdenoiser-sweep
  namespace: usd-djha
  labels:
    app: wandb-sweep
    user: timgsereda
spec:
  completions: 1
  parallelism: 1
  completionMode: Indexed
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: wandb-sweep
        user: timgsereda
    spec:
      restartPolicy: Never
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: PreferNoSchedule
      containers:
        - name: sweep-agent
          image: pytorch/pytorch:2.3.1-cuda12.1-cudnn8-runtime
          resources:
            requests:
              cpu: "8"
              memory: "16Gi"
              nvidia.com/a100: "1"
            limits:
              cpu: "12"
              memory: "32Gi"
              nvidia.com/a100: "1"
          env:
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wandb-secret
                  key: api-key
            - name: WANDB_PROJECT
              value: ctdenoiser-sweep
            - name: WANDB_ENTITY
              value: timgsereda
            # GPU packing: each run uses only ~30% of an A100 (small models on
            # 64px patches -> launch-bound). Run this many sweep agents per pod
            # on the one shared GPU so combined utilisation clears the cluster's
            # low-GPU-util kill threshold. 3 is safe now that the dataset is
            # memory-mapped (--mmap-cache: one shared page-cache copy instead of
            # a private ~GBs copy per agent) -- memory was the cap at 2.
            - name: AGENTS_PER_GPU
              value: "3"
            # PyTorch sizes its intra-op thread pool from the HOST's core count
            # (Nautilus nodes: 64-128 cores), not the pod's 8-CPU request. Each
            # agent + its DataLoader workers then spawns dozens of OpenMP/MKL
            # threads that thrash against the cgroup quota: CPU lands >100% of
            # request (a kill-policy violation) while the GPU starves behind the
            # slowed Python launch loop. GPU work is unaffected by these caps.
            - name: OMP_NUM_THREADS
              value: "1"
            - name: MKL_NUM_THREADS
              value: "1"
            - name: OPENBLAS_NUM_THREADS
              value: "1"
            # utility capability injects the driver's nvidia-cuda-mps-control so
            # MPS below can actually engage (compute alone does not).
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: data
              mountPath: /data
              readOnly: true
            - name: shm
              mountPath: /dev/shm
          args:
            - |
              set -e

              apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*

              pip install wandb matplotlib h5py

              # Copy preprocessed HDF5 from PVC to local emptyDir for fast I/O
              echo "Copying preprocessed data..."
              t0=$(date +%s)
              cp /data/ldct_preprocessed.h5 /workspace/data.h5
              echo "Copy done: $(du -h /workspace/data.h5 | cut -f1) in $(($(date +%s) - t0))s"

              git clone https://github.com/tsereda/ctdenoiser.git /workspace/ctdenoiser
              cd /workspace/ctdenoiser
              pip install -e .

              # Unpack the gzip-chunked h5 into mmap-able per-patient .npy files
              # ONCE, before the agents start: every agent + DataLoader worker
              # then shares a single page-cache copy of the dataset instead of
              # each holding a private full copy in RAM (the >100%-of-request
              # memory profile that got pods evicted). Matches the sweeps'
              # --mmap-cache=/workspace/npy_cache flag; the unpack is idempotent
              # so an agent racing ahead of it is still safe.
              python -c "from ctdenoiser.data.dataset import unpack_h5_to_npy; unpack_h5_to_npy('/workspace/data.h5', '/workspace/npy_cache')"

              # Periodic GPU/CPU telemetry in the pod log, so a util dip is
              # diagnosable from `kubectl logs` after the fact (was blind before:
              # packing+MPS shipped with no way to see whether util moved).
              ( while true; do
                  nvidia-smi --query-gpu=utilization.gpu,utilization.memory,memory.used --format=csv,noheader 2>/dev/null \
                    | sed "s/^/[gpu-util $(date -u +%H:%M:%S)] /"
                  sleep 300
                done ) &

              # NVIDIA MPS: let the packed agents share the GPU's SMs *concurrently*
              # rather than time-slicing (two launch-bound runs otherwise take turns
              # and util stays flat). Best-effort: if the control binary isn't in the
              # image/injection, log and fall back to plain time-slicing -- the sweep
              # still runs, just without the util boost.
              export CUDA_MPS_PIPE_DIRECTORY=/tmp/nvidia-mps
              export CUDA_MPS_LOG_DIRECTORY=/tmp/nvidia-mps-log
              mkdir -p "$CUDA_MPS_PIPE_DIRECTORY" "$CUDA_MPS_LOG_DIRECTORY"
              if command -v nvidia-cuda-mps-control >/dev/null 2>&1; then
                nvidia-cuda-mps-control -d && echo "MPS daemon started (concurrent GPU sharing)" \
                  || echo "MPS start failed; continuing time-sliced"
              else
                echo "nvidia-cuda-mps-control not found; continuing time-sliced (no MPS)"
              fi

              # Pack N sweep agents onto this pod's single A100 (see AGENTS_PER_GPU).
              # Each run is launch-bound at ~30% util, so several overlap well and
              # the sweep needs far fewer GPUs -- freeing the shared pool. The h5
              # copy / clone / install above happen once and are shared by all N.
              N="${AGENTS_PER_GPU:-1}"
              echo "launching $N sweep agent(s) on this GPU"
              pids=""
              for i in $(seq 1 "$N"); do
                wandb agent timgsereda/ctdenoiser-sweep/SWEEP_ID &
                pids="$pids $!"
              done
              # Exit non-zero if any agent fails, so the Job/backoff sees it.
              rc=0
              for p in $pids; do wait "$p" || rc=1; done
              exit $rc
          command: ["/bin/bash", "-c"]
      volumes:
        - name: workspace
          emptyDir:
            sizeLimit: 50Gi
        - name: data
          persistentVolumeClaim:
            claimName: ctdenoiser
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
