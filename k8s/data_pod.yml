apiVersion: v1
kind: Pod
metadata:
  name: ctdenoiser-data
  namespace: usd-djha
  labels:
    app: ctdenoiser-data
    user: timgsereda
spec:
  restartPolicy: Never
  containers:
    - name: data-loader
      image: python:3.11-slim
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -euo pipefail

          apt-get update && apt-get install -y --no-install-recommends git ca-certificates curl tar && rm -rf /var/lib/apt/lists/*
          pip install --no-cache-dir tcia_utils pydicom pandas h5py numpy

          # Clone the repo and install the package once (the conversion +
          # validation steps below need `import ctdenoiser`; running the script
          # alone only puts scripts/ on sys.path, not the repo root). torch comes
          # from the CPU index to avoid a multi-GB CUDA wheel on this CPU-only pod.
          git clone https://github.com/tsereda/ctdenoiser.git /app/ctdenoiser
          cd /app/ctdenoiser
          pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir -e ".[h5]"

          # ANATOMIES is the space-separated list of caches one run prepares.
          # Each anatomy maps to a TCIA BODY_PART cohort and a baked-in HU window,
          # so a single pod leaves every /data/ldct_<anatomy>.h5 validated on the
          # PVC -- run it once and every sweep has its cache ready. Override
          # ANATOMIES to prepare a subset. MAX_PATIENTS caps each cohort
          # (empty = all paired patients).
          export ANATOMIES="${ANATOMIES:-abdomen chest head}"
          export MAX_PATIENTS="${MAX_PATIENTS:-1000}"

          # Returns 0 iff the cache opens and lists patients -- the exact path the
          # sweep agents use. Lets us skip an already-good cache and, crucially,
          # detect a stale/corrupt one (the cryptic h5py "bad object header version
          # number") so it gets re-converted instead of silently breaking a sweep.
          cache_valid() {
            python3 -c "
          import sys
          from ctdenoiser.data.dataset import HDF5CTDataset
          try:
              pts = HDF5CTDataset.list_patients('$1')
          except Exception as e:
              print(f'  cache check failed: {e}')
              sys.exit(1)
          sys.exit(0 if pts else 1)
          "
          }

          for ANATOMY in $ANATOMIES; do
            case "$ANATOMY" in
              abdomen) BODY_PART=ABDOMEN ;;
              chest)   BODY_PART=CHEST ;;
              head)    BODY_PART=HEAD ;;
              *) echo "Unknown anatomy '$ANATOMY' (expected: abdomen chest head)" >&2; exit 1 ;;
            esac
            DICOM_DIR="/data/ldct_dicom_${ANATOMY}"
            export ANATOMY BODY_PART MAX_PATIENTS
            export H5_OUT="/data/ldct_${ANATOMY}.h5"

            echo ""
            echo "================ $ANATOMY ($BODY_PART) ================"

            # Skip the whole anatomy if a valid cache already exists -- makes
            # re-running the pod cheap and idempotent. A corrupt/stale cache (e.g.
            # one left by an interrupted older run) fails this check and is
            # re-converted below; the converter writes atomically, so overwriting
            # a broken cache in place is safe.
            if [ -f "$H5_OUT" ] && cache_valid "$H5_OUT"; then
              echo "Valid cache already present at $H5_OUT, skipping."
              continue
            fi
            if [ -f "$H5_OUT" ]; then
              echo "Existing $H5_OUT is missing/corrupt -- re-converting from DICOM."
            fi

            # 1. Download DICOM from TCIA into this anatomy's own dir -- skip if
            #    the PVC already holds it, so re-running does not re-pull
            #    gigabytes. Each anatomy gets its own /data/ldct_dicom_<anatomy>
            #    so one cohort's presence never masks another's absence. Download
            #    into /tmp first, then copy onto the PVC only once complete, so an
            #    interrupted download leaves no partial cohort behind.
            if [ -d "$DICOM_DIR" ] && [ -n "$(ls -A "$DICOM_DIR" 2>/dev/null)" ]; then
              echo "DICOM already present at $DICOM_DIR, skipping download."
            else
              TMP_DIR="/tmp/ldct_dicom_${ANATOMY}"
              export TMP_DIR
              python3 -c "
          from tcia_utils import nbia
          import pandas as pd, os

          TMP_DIR = os.environ['TMP_DIR']
          BODY_PART = os.environ['BODY_PART']
          _mp = os.environ.get('MAX_PATIENTS', '').strip()
          MAX_PATIENTS = int(_mp) if _mp else None

          series = nbia.getSeries(collection='LDCT-and-Projection-data')
          df = pd.DataFrame(series)
          imgs = df[(df['BodyPartExamined']==BODY_PART) & df['SeriesDescription'].isin(['Low Dose Images','Full Dose Images'])]
          by_pt = imgs.groupby('PatientID')['SeriesDescription'].apply(set)
          paired = by_pt[by_pt.apply(lambda x: 'Low Dose Images' in x and 'Full Dose Images' in x)].index.tolist()
          if MAX_PATIENTS:
              paired = paired[:MAX_PATIENTS]
          sub = imgs[imgs['PatientID'].isin(paired)]
          print(f'Downloading {len(sub)} series for {len(paired)} {BODY_PART} patients...')
          os.makedirs(TMP_DIR, exist_ok=True)
          nbia.downloadSeries(series_data=sub['SeriesInstanceUID'].tolist(), path=TMP_DIR, input_type='list')
          print(f'Done. Data saved to {TMP_DIR}')
          "
              mkdir -p "$DICOM_DIR"
              cp -r "$TMP_DIR"/. "$DICOM_DIR"/
              rm -rf "$TMP_DIR"
              echo "Download complete. Data copied to $DICOM_DIR."
            fi

            # 2. Convert DICOM -> HDF5. The converter bakes in the anatomy's HU
            #    window and writes the .h5 atomically (tmp + rename), so this is
            #    safe to run over an existing/corrupt cache.
            echo "Running DICOM to HDF5 conversion (anatomy=$ANATOMY)..."
            python scripts/convert_dicom_to_h5.py \
              --dicom-root "$DICOM_DIR" \
              --output "$H5_OUT" \
              --anatomy "$ANATOMY"

            # 3. Validate the freshly written cache before moving on. A fail here
            #    aborts the pod (set -e) rather than leaving a broken cache for a
            #    sweep to choke on. Listing groups is instant -- no volume read.
            echo "Validating $H5_OUT ..."
            if ! cache_valid "$H5_OUT"; then
              echo "Validation failed: $H5_OUT did not open with patients after conversion." >&2
              exit 1
            fi
            echo "OK: $H5_OUT ready."
          done

          # 4. Natural-image denoising set (for the --natural dataset). The
          #    theorem is not CT-specific, so the natural-image sweeps stress it
          #    on real images; BSDS500 is a small, standard clean-image corpus.
          #    Images land as a flat dir of JPGs on the PVC -- the dataset reads
          #    them read-only from /data and does its own grayscale + [0,1]
          #    conversion, and its own patient-style train/val split. Idempotent:
          #    a populated dir is left alone. A failed download is non-fatal --
          #    the --natural sweeps can fall back to procedural images.
          NATURAL_DIR=/data/natural_images
          echo ""
          echo "================ natural images (BSDS500) ================"
          if [ -d "$NATURAL_DIR" ] && [ -n "$(ls -A "$NATURAL_DIR" 2>/dev/null)" ]; then
            echo "Natural images already present at $NATURAL_DIR ($(ls "$NATURAL_DIR" | wc -l) files), skipping."
          else
            BSDS_URL="https://www2.eecs.berkeley.edu/Research/Projects/CS/vision/grouping/BSR/BSR_bsds500.tgz"
            mkdir -p /tmp/bsds
            if curl -fsSL -o /tmp/bsds/BSR.tgz "$BSDS_URL"; then
              tar -xzf /tmp/bsds/BSR.tgz -C /tmp/bsds
              mkdir -p "$NATURAL_DIR"
              find /tmp/bsds/BSR/BSDS500/data/images -name '*.jpg' -exec cp {} "$NATURAL_DIR"/ \;
              echo "Natural images ready: $(ls "$NATURAL_DIR" | wc -l) files in $NATURAL_DIR"
              rm -rf /tmp/bsds
            else
              echo "WARNING: BSDS500 download failed ($BSDS_URL)."
              echo "  --natural sweeps can still run with procedural images (omit --natural-root)."
            fi
          fi

          # Note: the simulated low-dose CT dataset (--sim-ldct) needs NO extra
          # download -- it manufactures the low arm from the full-dose volumes in
          # the abdomen cache, so sweep_sim_ldct.yml reads /data/ldct_abdomen.h5
          # directly. Make sure "abdomen" is in ANATOMIES above (it is by default).

          # 5. Final summary: confirm every requested cache opens and report its
          #    patient count / size, then show the PVC state the sweeps consume.
          echo ""
          echo "=== All caches ready -- /data ==="
          for ANATOMY in $ANATOMIES; do
            export H5_OUT="/data/ldct_${ANATOMY}.h5"
            python3 -c "
          import os
          from ctdenoiser.data.dataset import HDF5CTDataset
          p = os.environ['H5_OUT']
          pts = HDF5CTDataset.list_patients(p)
          print(f'  {p}: {len(pts)} patients, {os.path.getsize(p)/1e6:.1f} MB')
          "
          done
          if [ -d "$NATURAL_DIR" ]; then
            echo "  $NATURAL_DIR: $(ls "$NATURAL_DIR" 2>/dev/null | wc -l) natural images"
          fi
          ls -lah /data/
      volumeMounts:
        - name: workspace
          mountPath: /app
        - name: data
          mountPath: /data
        - name: shm
          mountPath: /dev/shm
      resources:
        requests:
          memory: 8Gi
          cpu: "2"
        limits:
          memory: 16Gi
          cpu: "4"
  volumes:
    - name: workspace
      emptyDir:
        sizeLimit: 50Gi
    - name: data
      persistentVolumeClaim:
        claimName: ctdenoiser
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi