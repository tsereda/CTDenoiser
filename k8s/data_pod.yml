apiVersion: v1
kind: Pod
metadata:
  name: ctdenoiser-data
  namespace: usd-djha
  labels:
    app: ctdenoiser-data
    user: timgsereda
spec:
  restartPolicy: Never
  nodeSelector:
    nautilus.io/linstor: "true"
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: nvidia.com/gpu.product
            operator: In
            values:
            - NVIDIA-A10
            - NVIDIA-GeForce-RTX-3090
            - NVIDIA-GeForce-RTX-4090
            - NVIDIA-TITAN-RTX
            - NVIDIA-RTX-A5000
            - Quadro-RTX-6000
            - Tesla-V100-SXM2-32GB
            - NVIDIA-A40
            - NVIDIA-L40
            - NVIDIA-RTX-A6000
            - Quadro-RTX-8000
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
    - key: nvidia.com/gpu
      operator: Exists
      effect: PreferNoSchedule
  containers:
    - name: data-loader
      image: gitlab-registry.nrp-nautilus.io/prp/jupyter-stack/prp
      command: ["/bin/bash", "-c"]
      args:
        - |
          sudo apt-get update && sudo apt-get install -y p7zip-full wget git
          pip install tcia_utils pydicom pandas h5py
          echo "Ready. Run: kubectl exec -it ctdenoiser-data -n usd-djha -- bash"
          tail -f /dev/null
      volumeMounts:
        - name: workspace
          mountPath: /app
        - name: data
          mountPath: /data
        - name: shm
          mountPath: /dev/shm
      resources:
        requests:
          memory: 24Gi
          cpu: "12"
          nvidia.com/gpu: "1"
        limits:
          memory: 32Gi
          cpu: "16"
          nvidia.com/gpu: "1"
  volumes:
    - name: workspace
      emptyDir:
        sizeLimit: 50Gi
    - name: data
      persistentVolumeClaim:
        claimName: ctdenoiser
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
