apiVersion: v1
kind: Pod
metadata:
  name: ctdenoiser-data
  namespace: usd-djha
  labels:
    app: ctdenoiser-data
    user: timgsereda
spec:
  restartPolicy: Never
  containers:
    - name: data-loader
      image: python:3.11-slim
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -euo pipefail

          apt-get update && apt-get install -y --no-install-recommends git ca-certificates && rm -rf /var/lib/apt/lists/*
          pip install --no-cache-dir tcia_utils pydicom pandas h5py numpy

          # Which anatomy cohort to pull. BODY_PART selects the TCIA scans;
          # ANATOMY picks the matching HU window for the HDF5 conversion below.
          #   ABDOMEN -> abdomen,  CHEST -> chest,  HEAD -> head
          # MAX_PATIENTS caps the cohort (empty = all paired patients, ~50 abdomen).
          export BODY_PART="${BODY_PART:-CHEST}"
          export ANATOMY="${ANATOMY:-chest}"
          export MAX_PATIENTS="${MAX_PATIENTS:-1000}"

          DICOM_DIR=/data/ldct_dicom
          export H5_OUT="/data/ldct_${ANATOMY}.h5"

          # 1. Download DICOM from TCIA -- skip if the PVC already holds it, so
          #    re-running the pod (e.g. for a second anatomy) does not re-pull
          #    gigabytes. Download into /tmp first, then copy onto the PVC only
          #    once it finished, so an interrupted download leaves no partial
          #    /data/ldct_dicom behind.
          if [ -d "$DICOM_DIR" ] && [ -n "$(ls -A "$DICOM_DIR" 2>/dev/null)" ]; then
            echo "DICOM already present at $DICOM_DIR, skipping download."
          else
            python3 -c "
          from tcia_utils import nbia
          import pandas as pd, os

          DICOM_DIR = '/tmp/ldct_dicom'
          BODY_PART = os.environ['BODY_PART']
          _mp = os.environ.get('MAX_PATIENTS', '').strip()
          MAX_PATIENTS = int(_mp) if _mp else None

          series = nbia.getSeries(collection='LDCT-and-Projection-data')
          df = pd.DataFrame(series)
          imgs = df[(df['BodyPartExamined']==BODY_PART) & df['SeriesDescription'].isin(['Low Dose Images','Full Dose Images'])]
          by_pt = imgs.groupby('PatientID')['SeriesDescription'].apply(set)
          paired = by_pt[by_pt.apply(lambda x: 'Low Dose Images' in x and 'Full Dose Images' in x)].index.tolist()
          if MAX_PATIENTS:
              paired = paired[:MAX_PATIENTS]
          sub = imgs[imgs['PatientID'].isin(paired)]
          print(f'Downloading {len(sub)} series for {len(paired)} {BODY_PART} patients...')
          os.makedirs(DICOM_DIR, exist_ok=True)
          nbia.downloadSeries(series_data=sub['SeriesInstanceUID'].tolist(), path=DICOM_DIR, input_type='list')
          print('Done. Data saved to /tmp/ldct_dicom/')
          "
            mkdir -p "$DICOM_DIR"
            cp -r /tmp/ldct_dicom/. "$DICOM_DIR"/
            echo "Download complete. Data copied to $DICOM_DIR."
          fi

          # 2. Clone the repo and run DICOM-to-HDF5 conversion. Install the
          #    package itself (editable) so `import ctdenoiser` resolves --
          #    running the script alone only puts scripts/ on sys.path, not the
          #    repo root. torch comes from the CPU index to avoid a multi-GB
          #    CUDA wheel on this CPU-only data pod. The converter writes the
          #    .h5 atomically, so overwriting an existing cache is safe.
          git clone https://github.com/tsereda/ctdenoiser.git /app/ctdenoiser
          cd /app/ctdenoiser
          pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir -e ".[h5]"

          echo "Running DICOM to HDF5 conversion (anatomy=$ANATOMY)..."
          python scripts/convert_dicom_to_h5.py \
            --dicom-root "$DICOM_DIR" \
            --output "$H5_OUT" \
            --anatomy "$ANATOMY"
          echo "Conversion complete. HDF5 saved to $H5_OUT"

          # 3. Quick sanity check: the cache opens and lists patients. This is
          #    the exact open path the sweep agents use, so a pass here means the
          #    PVC is ready; a fail aborts the pod (set -e) before a broken cache
          #    can take down a whole sweep. Listing groups is instant -- it does
          #    not read any volume data.
          echo "Validating $H5_OUT ..."
          python3 -c "
          import os, sys
          from ctdenoiser.data.dataset import HDF5CTDataset
          path = os.environ['H5_OUT']
          patients = HDF5CTDataset.list_patients(path)
          if not patients:
              sys.exit(f'Validation failed: {path} contains no patients')
          print(f'OK: {path} -> {len(patients)} patients, {os.path.getsize(path)/1e6:.1f} MB')
          "

          # 4. Show the final PVC state the sweep will consume.
          echo "=== PVC ready -- contents of /data ==="
          ls -lah /data/
      volumeMounts:
        - name: workspace
          mountPath: /app
        - name: data
          mountPath: /data
        - name: shm
          mountPath: /dev/shm
      resources:
        requests:
          memory: 8Gi
          cpu: "2"
        limits:
          memory: 16Gi
          cpu: "4"
  volumes:
    - name: workspace
      emptyDir:
        sizeLimit: 50Gi
    - name: data
      persistentVolumeClaim:
        claimName: ctdenoiser
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi