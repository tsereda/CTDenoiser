program: python -m ctdenoiser.train
method: grid

entity: timgsereda
project: ctdenoiser-sweep

# SSFlow inference-steps sweep: fabrication (hallucination) AND the quality/
# detectability one-vs-multi-step ablation, from a single set of trained models.
#
# Key efficiency point: --flow-steps-eval only changes *inference*, never the
# trained weights, so sweeping it as a grid axis re-trains the same model once
# per step count (the old 3x4x3=36 form trained 9 distinct models 4x each). This
# sweep instead trains each (exclude-radius, seed) model ONCE and re-evaluates
# that checkpoint at every step count via --eval-steps-sweep, logging
# val/steps{k}/* (quality) and det/steps{k}/* (detectability incl. the
# fabrication index). One run yields the whole within-model curve.
#
#   * Fabrication result: det/steps{k}/d_prime_fabrication vs k -- the generative-
#     specific failure (Bhadra 2021, Tivnan 2024). Expected: rises with steps
#     while one-step stays at the det/steps{k}/d_prime_fabrication_input floor.
#   * Steps ablation: val/steps{k}/psnr vs k (one-step MMSE vs multi-step Euler),
#     the same curve the method section's ablation reports -- now confound-free
#     (identical weights at every k), so it also supersedes sweep_ssflow.yml.
#
# Grid = 3 exclude-radius x 3 seeds = 9 runs (down from 36).
parameters:
  model:
    value: ssflow
  training-mode:
    value: ssflow

  epochs:
    value: 50

  # Match the throughput-tuned benchmark sweep: ssflow should not fall back
  # to train.py's 8-worker default, which can oversubscribe the pod CPU budget
  # and leave the GPU idle.
  batch-size:
    value: 32
  num-workers:
    value: 6
  prefetch-factor:
    value: 4

  seed:
    values:
      - 0
      - 1
      - 2

  # Noisy-pair construction: non-local self-similar patches (correlated-noise-aware),
  # pinned to the configuration validated in the ablation.
  ssflow-pairing:
    value: similarity
  ssflow-search-radius:
    value: 4
  ssflow-patch-radius:
    value: 1
  ssflow-num-similar:
    value: 1

  # The correlated-noise knob: candidate matches within this radius are excluded
  # so the paired noise is decorrelated. r=1 recovers the Noise2Sim target.
  ssflow-exclude-radius:
    values:
      - 1
      - 2
      - 3

  # One-step is the model default and the best-epoch selection metric; the full
  # step curve is evaluated post-training via --eval-steps-sweep below.
  flow-steps:
    value: 1
  flow-steps-eval:
    value: 1

command:
  - ${env}
  - python
  - -m
  - ctdenoiser.train
  - ${args}
  - --h5-path=/workspace/data.h5
  - --wandb-project=ctdenoiser-sweep
  - --eval-detectability
  # More slices than the default keep the CHO covariance (and d') stable; the
  # fabrication signal is smaller than the lesion signal.
  - --detectability-max-slices=300
  # Re-evaluate the trained checkpoint at each step count: one-step MMSE ->
  # multi-step generative Euler. Logs val/steps{k}/* and det/steps{k}/*.
  - --eval-steps-sweep
  - "1"
  - "4"
  - "8"
  - "20"
