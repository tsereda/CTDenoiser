program: python -m ctdenoiser.train
method: grid

entity: timgsereda
project: ctdenoiser-sweep

# Main benchmark: every model architecture x the architecture-dependent training
# methods (supervised / n2v / n2sim). Grid = 5 models x 3 modes x 3 seeds = 45.
# Parameter keys use hyphens so W&B's ${args} macro emits the exact CLI flags
# argparse expects (e.g. --training-mode, --n2v-mask-fraction).
#
# The per-image methods (zsn2n, f2n) ignore --model, so they are split out into
# sweep_periimage.yml to avoid 5x byte-identical reruns; run both sweeps for the
# full method table.
#
# One combination is special-cased by train.py:
#   * flowmatching + n2v/n2sim -> trains the *unconditional* self-supervised flow
#                            (ctdenoiser.models.ssflow) with the mode's target as
#                            the flow endpoint; the conditional flow would reproduce
#                            the target's noise, so the unconditional net is the
#                            correct self-supervised counterpart.
parameters:
  # Core architectures (each trained by supervised / n2v / n2sim).
  model:
    values:
      - redcnn
      - dncnn
      - unet
      - ctformer
      - flowmatching

  # Training methods that depend on the architecture. The per-image methods
  # (zsn2n, f2n) train a fresh net and ignore --model, so they are *not* swept
  # here -- replicating them across the 5 models would be byte-identical reruns.
  # They live in sweep_periimage.yml (2 modes x 3 seeds = 6 runs) instead.
  training-mode:
    values:
      - supervised   # clean-target MSE / flow-matching loss
      - n2v          # Noise2Void blind-spot self-supervision
      - n2sim        # Noise2Sim similarity-based self-supervision

  epochs:
    value: 50

  # Multiple seeds for significance: single-seed tables are an automatic reject,
  # and the self-supervised leads (e.g. Noise2Sim vs N2V) need >=3 seeds + a
  # per-patient std to survive review. Triples the grid; cut to [0, 1] if GPU is
  # tight. Each (model, mode, seed) is an independent run.
  seed:
    values:
      - 0
      - 1
      - 2

  # --- method-specific hyperparameters (used only by the matching mode) ---
  # Noise2Void blind-spot self-supervision
  n2v-mask-fraction:
    value: 0.02
  n2v-neighbor-radius:
    value: 2

  # Noise2Sim similarity-based self-supervision
  n2sim-search-radius:
    value: 4
  n2sim-patch-radius:
    value: 1
  n2sim-num-similar:
    value: 1

  # Flow matching ODE sampling steps (flowmatching model only)
  flow-steps:
    value: 20
  flow-steps-eval:
    value: 5

command:
  - ${env}
  - python
  - -m
  - ctdenoiser.train
  - ${args}
  - --h5-path=/workspace/data.h5
  - --wandb-project=ctdenoiser-sweep
  # Task-based detectability (CHO d' + corrected NPS) run once on the best model
  # at the end of each run -> logged as det/* (+ det/c{hu}/* contrast-detail
  # curve) alongside PSNR/SSIM. Appended in `command` (not `parameters`) because
  # it is a store_true flag and W&B's ${args} macro would emit
  # `--eval-detectability=True`, which argparse rejects.
  - --eval-detectability
  # The CHO re-denoises present/absent ROIs per contrast, so cap the slice count
  # to keep the end-of-run eval bounded (200 slices x 6 sites is ample for a
  # stable d'); drop the flag to use the full val set.
  - --detectability-max-slices=200
  # Per-image modes (zsn2n/f2n) re-train a fresh net for every ROI denoise, so
  # they use a much smaller detectability budget to stay in the minutes range.
  - --detectability-periimage-max-slices=25
