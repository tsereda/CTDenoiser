program: python -m ctdenoiser.train
method: grid

entity: timgsereda
project: ctdenoiser-sweep

parameters:
  model:
    values:
      - redcnn
      - dncnn
      - unet
      - ctformer
      - flowmatching

  epochs:
    value: 50

command:
  - ${env}
  - python
  - -m
  - ctdenoiser.train
  - ${args}
  - --h5-path=/workspace/data.h5
  - --wandb-project=ctdenoiser-sweep
