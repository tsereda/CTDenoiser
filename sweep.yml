program: python -m ctdenoiser.train
method: grid

entity: timgsereda
project: ctdenoiser-sweep

parameters:
  model:
    values:
      - redcnn
      - dncnn
      - unet
      - ctformer
      - flowmatching

  epochs:
    value: 50

  h5_cache:
    value: /data/ldct_cache.h5

  wandb_project:
    value: ctdenoiser-sweep

command:
  - ${env}
  - python
  - -m
  - ctdenoiser.train
  - --model=${model}
  - --lr=${lr}
  - --batch-size=${batch_size}
  - --patch-size=${patch_size}
  - --epochs=${epochs}
  - --h5-cache=${h5_cache}
  - --wandb-project=${wandb_project}
