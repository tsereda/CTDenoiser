program: python -m ctdenoiser.train
method: bayes
metric:
  name: val/psnr
  goal: maximize

entity: timgsereda
project: ctdenoiser-sweep

parameters:
  model:
    values:
      - redcnn
      - dncnn
      - unet
      - ctformer
      - flowmatching

  lr:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-3

  batch_size:
    values: [4, 8, 16]

  patch_size:
    values: [64, 128]

  epochs:
    value: 50

  h5_cache:
    value: /data/ldct_cache.h5

  wandb_project:
    value: ctdenoiser-sweep

command:
  - ${env}
  - python
  - -m
  - ctdenoiser.train
  - --model=${model}
  - --lr=${lr}
  - --batch-size=${batch_size}
  - --patch-size=${patch_size}
  - --epochs=${epochs}
  - --h5-cache=${h5_cache}
  - --wandb-project=${wandb_project}
