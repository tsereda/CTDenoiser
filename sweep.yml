program: python -m ctdenoiser.train
method: grid

entity: timgsereda
project: ctdenoiser-sweep

# Sweep over every model architecture AND every training method exposed by
# ctdenoiser.train. Parameter keys use hyphens so W&B's ${args} macro emits the
# exact CLI flags argparse expects (e.g. --training-mode, --n2v-mask-fraction).
#
# Some combinations in this grid are special-cased by train.py:
#   * flowmatching + n2v/n2sim -> rejected (flow matching needs paired clean
#                            targets); those runs fail fast and can be ignored.
#   * zsn2n / f2n (any model) -> train a fresh per-image net and ignore --model,
#                            so the 5 runs per per-image mode are equivalent.
parameters:
  # Core architectures (used by supervised / n2v / n2sim; ignored by zsn2n / f2n).
  model:
    values:
      - redcnn
      - dncnn
      - unet
      - ctformer
      - flowmatching

  # Training methods / core functions.
  training-mode:
    values:
      - supervised   # clean-target MSE / flow-matching loss
      - n2v          # Noise2Void blind-spot self-supervision
      - n2sim        # Noise2Sim similarity-based self-supervision
      - zsn2n        # Zero-Shot Noise2Noise per-image test-time training
      - f2n          # Filter2Noise per-image attention-guided bilateral filtering

  epochs:
    value: 50

  # Multiple seeds for significance: single-seed tables are an automatic reject,
  # and the self-supervised leads (e.g. Noise2Sim vs N2V) need >=3 seeds + a
  # per-patient std to survive review. Triples the grid; cut to [0, 1] if GPU is
  # tight. Each (model, mode, seed) is an independent run.
  seed:
    values:
      - 0
      - 1
      - 2

  # --- method-specific hyperparameters (used only by the matching mode) ---
  # Noise2Void blind-spot self-supervision
  n2v-mask-fraction:
    value: 0.02
  n2v-neighbor-radius:
    value: 2

  # Noise2Sim similarity-based self-supervision
  n2sim-search-radius:
    value: 4
  n2sim-patch-radius:
    value: 1
  n2sim-num-similar:
    value: 1

  # Zero-Shot Noise2Noise per-image optimisation
  zsn2n-iters:
    value: 2000
  zsn2n-channels:
    value: 48
  zsn2n-lr:
    value: 0.001

  # Filter2Noise per-image attention-guided bilateral filtering
  f2n-iters:
    value: 1500
  f2n-layers:
    value: 2
  f2n-radius:
    value: 3
  f2n-channels:
    value: 16
  f2n-lr:
    value: 0.001

  # Flow matching ODE sampling steps (flowmatching model only)
  flow-steps:
    value: 20
  flow-steps-eval:
    value: 5

command:
  - ${env}
  - python
  - -m
  - ctdenoiser.train
  - ${args}
  - --h5-path=/workspace/data.h5
  - --wandb-project=ctdenoiser-sweep
  # Task-based detectability (CHO d' + corrected NPS) run once on the best model
  # at the end of each run -> logged as det/* (+ det/c{hu}/* contrast-detail
  # curve) alongside PSNR/SSIM. Appended in `command` (not `parameters`) because
  # it is a store_true flag and W&B's ${args} macro would emit
  # `--eval-detectability=True`, which argparse rejects. No-op for the per-image
  # zsn2n/f2n runs (they print a skip and continue).
  - --eval-detectability
  # The CHO re-denoises present/absent ROIs per contrast, so cap the slice count
  # to keep the end-of-run eval bounded (200 slices x 6 sites is ample for a
  # stable d'); drop the flag to use the full val set.
  - --detectability-max-slices=200
